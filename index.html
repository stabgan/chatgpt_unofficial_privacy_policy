<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Unofficial privacy policy reference page for ChatGPT by OpenAI.">
    <title>ChatGPT Unofficial Privacy Policy Reference</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                         Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background-color: #fafafa;
            padding: 2rem 1rem;
            max-width: 720px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 0.25rem;
        }

        h2 {
            font-size: 1.25rem;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }

        a {
            color: #0066cc;
            text-decoration: none;
        }

        a:hover,
        a:focus {
            text-decoration: underline;
        }

        a:focus-visible {
            outline: 2px solid #0066cc;
            outline-offset: 2px;
        }

        p {
            margin-bottom: 1rem;
        }

        footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #ddd;
            font-size: 0.875rem;
            color: #555;
        }
    </style>
</head>
<body>
    <header>
        <h1>Privacy Policies</h1>
    </header>

    <main>
        <section aria-labelledby="openai-policy">
            <h2 id="openai-policy">OpenAI Privacy Policy</h2>
            <p>
                Please read OpenAI's Privacy Policy at:
                <a href="https://openai.com/policies/privacy-policy" target="_blank" rel="noopener noreferrer">
                    https://openai.com/policies/privacy-policy
                </a>
            </p>
        </section>
    </main>

    <footer>
        <h2 id="disclaimer">Disclaimer</h2>
        <p>
            I am in no way responsible for or associated with the product or its content.
            All information, policies, and terms are solely the responsibility of OpenAI.
        </p>
    </footer>
</body>
</html>
